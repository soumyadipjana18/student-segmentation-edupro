<!--
  TIMER / AUTO-ADVANCE PAGES SNIPPET
  ----------------------------------
  Where to add this in app.py:

  1) Paste the <div class="autoplay-bar">...</div> block inside your
     <div class="topbar"> ... </div>, right after the </nav> tag.

  2) Paste the <script>...</script> block right before the closing
     </body> tag (after {{ body|safe }} content).

  3) This requires "pages" and "page" to be passed into the template
     (PAGES list and current page name) — same as in app.py already.

  Change DELAY_MS below to control how many seconds each page is shown
  before auto-advancing (currently 12000ms = 12 seconds).
-->

<!-- 1) PUT THIS INSIDE <div class="topbar"> AFTER </nav> -->
<div class="autoplay-bar">
  <span id="autoplayLabel">Auto-advance: off</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <button id="autoplayBtn" type="button">▶ Play</button>
</div>

<!-- CSS needed for the bar above — add inside your <style> block -->
<style>
  .autoplay-bar{display:flex;align-items:center;gap:10px;margin-left:auto;font-size:13px;color:var(--muted);}
  .autoplay-bar button{background:#1c2130;border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;}
  .autoplay-bar button.on{background:var(--blue);border-color:var(--blue);color:white;}
  .progress-track{width:64px;height:4px;background:#262b38;border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;width:0%;background:var(--blue);}
</style>

<!-- 2) PUT THIS RIGHT BEFORE </body> -->
<script>
(function(){
  var PAGES = {{ pages|tojson }};   // e.g. ["Overview", "Learner Profile Explorer", ...]
  var CURRENT = {{ page|tojson }};  // current page name
  var DELAY_MS = 12000; // <-- change this to adjust seconds per page (12000 = 12s)
  var STEP_MS = 100;

  var btn = document.getElementById("autoplayBtn");
  var label = document.getElementById("autoplayLabel");
  var fill = document.getElementById("progressFill");

  var enabled = localStorage.getItem("edupro_autoplay") === "1";
  var elapsed = 0;
  var timerId = null;

  function nextPageUrl(){
    var idx = PAGES.indexOf(CURRENT);
    var nextIdx = (idx + 1) % PAGES.length;
    return "/?page=" + encodeURIComponent(PAGES[nextIdx]) + "&auto=1";
  }

  function updateUI(){
    btn.textContent = enabled ? "⏸ Pause" : "▶ Play";
    btn.className = enabled ? "on" : "";
    label.textContent = "Auto-advance: " + (enabled ? "on" : "off");
  }

  function tick(){
    elapsed += STEP_MS;
    var pct = Math.min(100, (elapsed / DELAY_MS) * 100);
    fill.style.width = pct + "%";
    if (elapsed >= DELAY_MS){
      window.location.href = nextPageUrl();
    }
  }

  function start(){
    elapsed = 0;
    fill.style.width = "0%";
    if (timerId) clearInterval(timerId);
    timerId = setInterval(tick, STEP_MS);
  }

  function stop(){
    if (timerId) clearInterval(timerId);
    timerId = null;
    fill.style.width = "0%";
  }

  btn.addEventListener("click", function(){
    enabled = !enabled;
    localStorage.setItem("edupro_autoplay", enabled ? "1" : "0");
    updateUI();
    if (enabled) start(); else stop();
  });

  updateUI();
  if (enabled) start();
})();
</script>
